# =========================================
# Data Structure Lab Project - Configuration
# =========================================
server.port=3000

# --- MySQL / MariaDB connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/data_structure_lab?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=parking_user
spring.datasource.password=parking123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP pool ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

# --- Static frontend served from /frontend (one folder up from /backend) ---
# Spring will serve everything from /frontend at "/"
spring.web.resources.static-locations=file:../frontend/

# --- Logging ---
logging.level.org.springframework=INFO
logging.level.com.dslab=INFO
spring.main.banner-mode=off
